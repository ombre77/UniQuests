name: UniQuests
description: $description
prefix: UniQuests
version: '${version}'

main: net.ody.uniQuests.UniQuests
paperPluginLoader: net.ody.uniQuests.UniQuestsLoader
api-version: '1.21.11'
load: POSTWORLD

authors: [ .ody ]
website: https://github.com/ombre77/UniQuests

commands:
  quests:
    description: Opens the quests menu
    usage: /quests
    aliases: [quest,q]

  questreload:
    description: Reloads all UniQuests related datas
    usage: /questreload
    permission: op